<body>

<div class="logo-container">
  <img src="logo.png" alt="Warsash Sailing Club Logo" class="club-logo">
</div>

<h1>Warsash Sailing Club — Pursuit Race Start Sequence</h1>
<div class="race-date" id="raceDate"></div>

<div class="tabs">
  <button class="tab-btn active" data-tab="race">Race</button>
  <button class="tab-btn" data-tab="find">Find Start</button>
</div>

<div class="sound-row">
  <span class="sound-note">iPhone: turn OFF the mute switch and turn the RINGER volume up with the side buttons (not the media/music volume) — Safari plays this at ringer volume.</span>
  <button class="secondary" id="testSoundBtn">Test Sound</button>
  <button class="secondary" id="soundToggle">🔇 Sound Off</button>
</div>

<div class="view active" id="raceView">
  <div class="top">
    <div>Current time</div>
    <div class="clock" id="clock">--:--</div>
  </div>

  <div class="boats-row">
    <div class="boats-card">
      <h2>Last Start</h2>
      <div class="time" id="lastTime"></div>
      <div class="boats-list" id="lastBoats"></div>
    </div>
    <div class="countdown-box" id="countdownBox">
      <div class="countdown-label">Next Sound Signal</div>
      <div class="countdown" id="countdown">--</div>
    </div>
    <div class="boats-card">
      <h2>Next Start</h2>
      <div class="time" id="nextTime"></div>
      <div class="next-start-countdown" id="nextStartCountdown"></div>
      <div class="boats-list" id="nextBoats"></div>
    </div>
  </div>

  <div class="status-line" id="statusLine" style="text-align:center;"></div>
</div>

<div class="view" id="findView">
  <div class="panel find-select">
    <h2>Find Start Time</h2>
    <select id="findClassSelect">
      <option value="">Select a class…</option>
    </select>
  </div>

  <div id="findResult" style="display:none;">
    <div class="find-adjacent" id="findPrevious"></div>
    <div class="find-main">
      <div class="find-time" id="findTime"></div>
      <div class="boats-list" id="findBoats"></div>
    </div>
    <div class="find-adjacent" id="findNext"></div>
  </div>
</div>

<script>
const FALLBACK_STARTS = [
  ["18:30","RS FEVA XL",1248],["18:32","ILCA 4",1218],["18:33","WANDERER",1201],
  ["18:34","MIRACLE",1196],["18:35","FIREFLY",1178],["18:35","RS NEO",1180],
  ["18:37","GP14",1145],["18:37","ILCA 6",1156],["18:37","RS VISION",1150],
  ["18:38","ENTERPRISE",1137],["18:38","EUROPE",1140],["18:38","RS Aero 5",1141],
  ["18:38","SOLO",1139],["18:39","2000",1122],["18:39","STREAKER",1121],
  ["18:40","GRADUATE",1110],["18:40","ILCA 7",1103],["18:40","LASER STRATOS",1108],
  ["18:40","SOLUTION",1112],["18:40","WAYFARER",1107],["18:40","ZENITH",1106],
  ["18:41","420",1100],["18:41","OK",1092],["18:41","RS Aero 6",1098],
  ["18:41","RS VAREO",1095],["18:42","HADRON H1",1080],["18:42","SUPERNOVA",1075],
  ["18:43","FARR 3.7",1063],["18:43","NATIONAL 12",1070],["18:43","RS Aero 7",1062],
  ["18:44","BLAZE FIRE",1050],["18:44","FINN",1049],["18:44","HARTLEY ZENITH",1051],
  ["18:44","RS 200",1053],["18:45","ALBACORE",1037],["18:45","HADRON H2",1045],
  ["18:45","KESTREL",1042],["18:45","SCORPION",1042],["18:46","BLAZE",1030],
  ["18:46","TASAR",1022],["18:47","BUZZ",1009],["18:48","MELGES 15",994],
  ["18:48","PHANTOM",998],["18:48","RS Aero 9",1005],["18:49","MERLIN-ROCKET",980],
  ["18:50","RS 300",965],["18:51","DEVOTI D-ONE",957],["18:51","FIREBALL",960],
  ["18:52","RS 400",945],["18:53","OSPREY",932],["18:54","RS 600",921],
  ["18:55","29er",900],["18:56","505",892],["18:56","BREEZE 6.0",890],
  ["18:58","B14",858],["18:58","INTERNATIONAL CANOE",858],["19:06","SPITFIRE",745],
  ["19:10","49er",697]
].map(([time, cls, py]) => ({time, class: cls, py}));

let starts = structuredClone(FALLBACK_STARTS);
let raceDate = todayStr();  // 'YYYY-MM-DD' the active schedule applies to
let scheduleData = null;    // last successfully fetched schedule.json payload

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
}

// schedule.json supports two formats:
//   Legacy: a flat array of starts — applies to today.
//   Multi-date: an object keyed by ISO date, e.g.
//     { "2026-07-08": [ {time, class, py}, ... ], "2026-07-15": [ ... ] }
// Returns a normalised {dateStr: starts[]} map, or null if unusable.
function normaliseSchedule(data) {
  if (Array.isArray(data)) {
    return data.length ? { [todayStr()]: data } : null;
  }
  if (data && typeof data === 'object') {
    const out = {};
    for (const [k, v] of Object.entries(data)) {
      if (/^\d{4}-\d{2}-\d{2}$/.test(k) && Array.isArray(v) && v.length) out[k] = v;
    }
    return Object.keys(out).length ? out : null;
  }
  return null;
}

// Prefer today's schedule; otherwise the next upcoming race day;
// otherwise the most recent past one (so Find Start still works).
function pickRaceDate(dates) {
  const keys = Object.keys(dates).sort();
  const today = todayStr();
  if (dates[today]) return today;
  const future = keys.find(k => k > today);
  return future || keys[keys.length - 1];
}

function applySchedule() {
  const dates = normaliseSchedule(scheduleData);
  if (dates) {
    raceDate = pickRaceDate(dates);
    starts = dates[raceDate];
  } else {
    raceDate = todayStr();
    starts = structuredClone(FALLBACK_STARTS);
  }
}

async function loadSchedule() {
  try {
    const res = await fetch('schedule.json', { cache: 'no-store' });
    if (res.ok) {
      const data = await res.json();
      if (normaliseSchedule(data)) scheduleData = data;
    }
  } catch (e) {}
  applySchedule(); // re-picks the date too, so it rolls over correctly at midnight
  renderFindOptions();
  tick();
}

setInterval(loadSchedule, 30000);
document.addEventListener('visibilitychange', () => {
  if (!document.hidden) {
    loadSchedule();
    keepAwake(); // wake lock is released whenever the page is backgrounded — re-arm it
  }
});

// ---- Screen wake lock: stop the phone auto-locking mid-sequence ----
let wakeLock = null;
async function keepAwake() {
  if (!('wakeLock' in navigator)) return;
  try {
    wakeLock = await navigator.wakeLock.request('screen');
    wakeLock.addEventListener('release', () => { wakeLock = null; });
  } catch (e) {}
}

function sortStarts() {
  starts.sort((a, b) => a.time === b.time
    ? a.class.localeCompare(b.class)
    : a.time.localeCompare(b.time));
}

function timeToDate(hhmm, dateStr) {
  const [h, m] = hhmm.split(':').map(Number);
  const [Y, Mo, D] = dateStr.split('-').map(Number);
  return new Date(Y, Mo - 1, D, h, m, 0, 0);
}

function formatRaceDate(dateStr) {
  const [Y, Mo, D] = dateStr.split('-').map(Number);
  return new Date(Y, Mo - 1, D).toLocaleDateString('en-GB', {
    weekday: 'long', day: 'numeric', month: 'long'
  });
}

function groupedTimes() {
  sortStarts();
  const map = new Map();
  for (const s of starts) {
    if (!map.has(s.time)) map.set(s.time, []);
    map.get(s.time).push(s.class);
  }
  return [...map.entries()].map(([time, classes]) => ({
    time, classes, date: timeToDate(time, raceDate)
  })).sort((a, b) => a.date - b.date);
}

function renderBoats(elTime, elBoats, group) {
  if (!group) {
    elTime.textContent = '';
    elBoats.innerHTML = '<span class="empty">—</span>';
    return;
  }
  elTime.textContent = group.time;
  elBoats.innerHTML = group.classes
    .map(c => `<span class="boat-chip">${escapeHtml(c)}</span>`)
    .join('');
}

function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, ch => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[ch]));
}

const SOUND_KEY = 'pursuitRaceSoundOn';
let soundOn = localStorage.getItem(SOUND_KEY) !== '0'; // default on
let audioCtx = null;
let audioUnlocked = false;
let lastLongBeepKey = null;
let lastShortBeepKey = null;

// Phone speakers have almost no output at low frequencies, so the tones sit
// higher (1200Hz short / 900Hz long), use a square wave for cut-through
// outdoors, and ramp the gain so there's no click on stop.
const SHORT_FREQ = 1200, SHORT_MS = 150;
const LONG_FREQ = 900, LONG_MS = 700;

function beep(freq, durationMs, volume) {
  if (!audioCtx || audioCtx.state !== 'running') return;
  const t = audioCtx.currentTime;
  const end = t + durationMs / 1000;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'square';
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(0, t);
  gain.gain.linearRampToValueAtTime(volume, t + 0.01);
  gain.gain.setValueAtTime(volume, Math.max(t + 0.02, end - 0.03));
  gain.gain.linearRampToValueAtTime(0, end);
  osc.connect(gain).connect(audioCtx.destination);
  osc.start(t);
  osc.stop(end);
}

// Visual signal backup — flashes the countdown box even if audio has failed
// (mute switch, ringer down, audio never unlocked).
function flash(kind) {
  const box = document.getElementById('countdownBox');
  box.classList.remove('flash-short', 'flash-long');
  void box.offsetWidth; // restart the animation
  box.classList.add(kind === 'long' ? 'flash-long' : 'flash-short');
}

function updateSoundBtn() {
  const btn = document.getElementById('soundToggle');
  btn.textContent = soundOn ? '🔊 Sound On' : '🔇 Sound Off';
  btn.classList.toggle('active', soundOn);
}

async function unlockAudio() {
  // Safari (17+) defaults web audio to the "ambient" session category, which is
  // silenced by the mute switch and follows ringer volume, not media volume.
  // Requesting "playback" opts out of that where supported.
  if ('audioSession' in navigator) {
    try { navigator.audioSession.type = 'playback'; } catch (e) {}
  }
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') {
    // iOS Safari flips audioCtx.state to 'running' only once this promise
    // resolves — calling beep() before awaiting it silently does nothing there,
    // even though the same code works fine on desktop browsers.
    try { await audioCtx.resume(); } catch (e) {}
  }
  // iOS wants a user gesture before granting a wake lock on some versions —
  // this runs on the first tap, so audio and wake lock get armed together.
  keepAwake();
  if (audioUnlocked) return;
  audioUnlocked = true;
  if (soundOn) beep(SHORT_FREQ, 120, 1);
  document.removeEventListener('click', unlockAudio, true);
  document.removeEventListener('touchstart', unlockAudio, true);
  document.removeEventListener('keydown', unlockAudio, true);
}
// Sound needs one interaction anywhere on the page before browsers allow it to
// play (autoplay policy) — this arms it silently on the very first tap/click,
// so it's not tied to hitting the sound button specifically.
document.addEventListener('click', unlockAudio, true);
document.addEventListener('touchstart', unlockAudio, true);
document.addEventListener('keydown', unlockAudio, true);

document.getElementById('soundToggle').addEventListener('click', async () => {
  soundOn = !soundOn;
  localStorage.setItem(SOUND_KEY, soundOn ? '1' : '0');
  await unlockAudio();
  if (soundOn) beep(SHORT_FREQ, 150, 1);
  updateSoundBtn();
});
updateSoundBtn();

document.getElementById('testSoundBtn').addEventListener('click', async () => {
  await unlockAudio();
  beep(SHORT_FREQ, 150, 1);
  setTimeout(() => beep(LONG_FREQ, 700, 1), 350);
});

// Sound signals fire only for each class start: a short beep each second for
// the last 5 seconds, then a long beep on the start itself. Minutes with no
// start are silent. The visual flash fires regardless of the sound setting.
function maybeSignal(now, groups) {
  if (!groups.length) return;
  for (const g of groups) {
    const diff = (g.date - now) / 1000;
    if (diff < -1) continue; // this start is already past — check the next one

    // ceil so each signal fires at (or just after) its moment, never early —
    // the tick runs every 250ms so worst-case lateness is one tick.
    const secsLeft = Math.max(0, Math.ceil(diff));
    const key = g.date.getTime();
    if (secsLeft === 0) {
      if (lastLongBeepKey !== key) {
        lastLongBeepKey = key;
        if (soundOn) beep(LONG_FREQ, LONG_MS, 1);
        flash('long');
      }
    } else if (secsLeft <= 5) {
      const shortKey = key + '-' + secsLeft;
      if (lastShortBeepKey !== shortKey) {
        lastShortBeepKey = shortKey;
        if (soundOn) beep(SHORT_FREQ, SHORT_MS, 1);
        flash('short');
      }
    }
    return; // only the nearest upcoming start matters
  }
}

function tick() {
  const now = new Date();

  const groups = groupedTimes();
  maybeSignal(now, groups);
  let lastGroup = null, nextGroup = null;
  for (const g of groups) {
    if (g.date <= now) lastGroup = g;
    else { nextGroup = g; break; }
  }

  renderBoats(document.getElementById('lastTime'), document.getElementById('lastBoats'), lastGroup);
  renderBoats(document.getElementById('nextTime'), document.getElementById('nextBoats'), nextGroup);

  const countdownEl = document.getElementById('countdown');
  const statusEl = document.getElementById('statusLine');
  const nextCountdownEl = document.getElementById('nextStartCountdown');
  countdownEl.classList.remove('warn', 'urgent', 'done');

  if (!groups.length) {
    countdownEl.textContent = '--';
    nextCountdownEl.textContent = '';
    statusEl.textContent = 'Add starts in schedule.json.';
    return;
  }

  const today = todayStr();
  const raceDateEl = document.getElementById('raceDate');

  // Non-today race day: show which day's schedule this is and skip the
  // per-second countdowns — signals only ever fire on the race day itself.
  if (raceDate !== today) {
    raceDateEl.textContent = raceDate > today
      ? `Next race day: ${formatRaceDate(raceDate)}`
      : `Last race day: ${formatRaceDate(raceDate)}`;
    countdownEl.textContent = '--';
    nextCountdownEl.textContent = '';
    statusEl.textContent = raceDate > today
      ? `First signal at ${groups[0].time} on ${formatRaceDate(raceDate)}`
      : `All boats away — last start was ${groups[groups.length - 1].time}`;
    return;
  }
  raceDateEl.textContent = formatRaceDate(raceDate);

  if (nextGroup) {
    // Both countdowns are derived from the same target with the same ceil,
    // so they always change at exactly the same instant. (Previously one used
    // getSeconds() — flipping at .000 — and the other Math.round — flipping
    // at .500 — which is why they visibly ticked half a second apart.)
    const secs = Math.max(0, Math.ceil((nextGroup.date - now) / 1000));
    const mm = Math.floor(secs / 60);
    const ss = secs % 60;
    nextCountdownEl.textContent = `Starts in ${mm}:${String(ss).padStart(2, '0')}`;
    countdownEl.textContent = secs >= 60 ? `${mm}:${String(ss).padStart(2, '0')}` : String(secs);
    if (secs <= 3) countdownEl.classList.add('urgent');
    else if (secs <= 10) countdownEl.classList.add('warn');
    statusEl.textContent = now < groups[0].date ? `First start at ${groups[0].time}` : '';
  } else {
    nextCountdownEl.textContent = '';
    countdownEl.textContent = '--';
    countdownEl.classList.add('done');
    statusEl.textContent = `All boats away — last start was ${lastGroup.time}`;
  }
}

// The clock runs on its own requestAnimationFrame loop so the milliseconds
// read smoothly rather than jumping in 250ms steps with the logic tick.
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', second: '2-digit' })
    + '.' + String(now.getMilliseconds()).padStart(3, '0');
  requestAnimationFrame(updateClock);
}

function renderFindOptions() {
  const select = document.getElementById('findClassSelect');
  const current = select.value;
  const classNames = [...new Set(starts.map(s => s.class))].sort((a, b) => a.localeCompare(b));
  select.innerHTML = '<option value="">Select a class…</option>' +
    classNames.map(c => `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join('');
  if (classNames.includes(current)) select.value = current;
  renderFindResult();
}

function renderAdjacentStart(el, label, group) {
  if (!group) {
    el.innerHTML = `<div class="label">${label}</div><div class="empty">—</div>`;
    return;
  }
  el.innerHTML = `
    <div class="label">${label}</div>
    <div class="time">${group.time}</div>
    <div class="boats-list">${group.classes.map(c => `<span class="boat-chip">${escapeHtml(c)}</span>`).join('')}</div>
  `;
}

function renderFindResult() {
  const cls = document.getElementById('findClassSelect').value;
  const resultEl = document.getElementById('findResult');
  if (!cls) { resultEl.style.display = 'none'; return; }
  const groups = groupedTimes();
  const idx = groups.findIndex(g => g.classes.includes(cls));
  if (idx === -1) { resultEl.style.display = 'none'; return; }
  resultEl.style.display = 'block';
  document.getElementById('findTime').textContent = groups[idx].time;
  document.getElementById('findBoats').innerHTML = groups[idx].classes
    .map(c => `<span class="boat-chip">${escapeHtml(c)}</span>`).join('');
  renderAdjacentStart(document.getElementById('findPrevious'), 'Previous Start', groups[idx - 1]);
  renderAdjacentStart(document.getElementById('findNext'), 'Next Start', groups[idx + 1]);
}

document.getElementById('findClassSelect').addEventListener('change', renderFindResult);

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(btn.dataset.tab + 'View').classList.add('active');
  });
});

// ---- PWA service worker ----
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

renderFindOptions();
tick();
updateClock();
loadSchedule();
keepAwake();
// 250ms tick: setInterval at 1000ms drifts enough to fire beeps up to a second
// late (or skip a short in the 5-4-3-2-1). The dedupe keys prevent double-fires.
setInterval(tick, 250);
</script>
</body>
</html>
